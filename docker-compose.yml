services:
  redis:
    image: redis:7-alpine
    container_name: job-farm-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - job-farm-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  worker1:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: job-farm-worker1
    env_file:
      - .env
    environment:
      - WORKER_ID=worker1
      - WORKER_PORT=5000
      - REDIS_URL=redis://redis:6379
    ports:
      - "5002:5000"
      - "8001:8000"
    volumes:
      - worker1_sessions:/mnt/jupyter_sessions
      - worker1_data:/mnt/data
      - ./src:/workspace
    networks:
      - job-farm-network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker2:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: job-farm-worker2
    env_file:
      - .env
    environment:
      - WORKER_ID=worker2
      - WORKER_PORT=5000
      - REDIS_URL=redis://redis:6379
    ports:
      - "5003:5000"
      - "8002:8000"
    volumes:
      - worker2_sessions:/mnt/jupyter_sessions
      - worker2_data:/mnt/data
      - ./src:/workspace
    networks:
      - job-farm-network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker3:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: job-farm-worker3
    env_file:
      - .env
    environment:
      - WORKER_ID=worker3
      - WORKER_PORT=5000
      - REDIS_URL=redis://redis:6379
    ports:
      - "5004:5000"
      - "8003:8000"
    volumes:
      - worker3_sessions:/mnt/jupyter_sessions
      - worker3_data:/mnt/data
      - ./src:/workspace
    networks:
      - job-farm-network
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

networks:
  job-farm-network:
    driver: bridge

volumes:
  redis_data:
  worker1_sessions:
  worker2_sessions:
  worker3_sessions:
  worker1_data:
  worker2_data:
  worker3_data:
